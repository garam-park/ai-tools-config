name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning
          additional_files: bootstrap.sh install-skills.sh install-global-instructions.sh tests/installers_test.sh

  test:
    name: Installer tests
    needs: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run installer tests (isolated HOME)
        run: bash tests/installers_test.sh
