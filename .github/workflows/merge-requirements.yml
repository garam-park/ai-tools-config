name: Merge Requirements

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  # M-1.1 + M-1.2: 셸 정적 검사 + 설치 테스트
  shell-and-tests:
    name: ShellCheck + Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning
          additional_files: bootstrap.sh install-skills.sh install-global-instructions.sh tests/installers_test.sh

      - name: Run installer tests
        run: bash tests/installers_test.sh

  # M-1.3: 커밋 메시지 (task NN) / (tasks NN,MM) 토큰 (경고성 — 운영자 판단)
  # 토큰 규약은 작업 카드 관련 커밋에만 적용되므로(docs/archive/tasks/STATUS.md) 전 커밋 차단은 하지 않는다.
  commit-convention:
    name: Commit message convention (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Warn on commits without (task NN) / (tasks NN,MM) tokens
        run: |
          set -euo pipefail
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          if [ -z "$BASE" ] || [ -z "$HEAD" ]; then
            echo "PR base/head SHA missing — skipping"
            exit 0
          fi
          # 허용 형식: (task 01) / (task 1, 2) / (tasks 01,22) / (tasks 01-32)
          missing="$(git log "$BASE..$HEAD" --pretty='%s' | grep -vE '\(tasks? [0-9, \-]+\)' || true)"
          if [ -n "$missing" ]; then
            echo "::warning::작업 토큰이 없는 커밋이 있습니다. 작업 카드 관련 커밋이라면 (task NN) / (tasks NN,MM) 토큰을 붙이세요:"
            while IFS= read -r line; do
              echo "::warning::$line"
            done <<< "$missing"
            exit 0
          fi
          echo "OK: 모든 커밋이 작업 토큰 규약을 만족합니다."

  # M-1.5: AI 트레일러 부재
  no-ai-trailers:
    name: No AI trailers in commit messages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Reject Co-Authored-By / Generated with
        run: |
          set -euo pipefail
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          bad="$(git log "$BASE..$HEAD" --pretty='%B' | grep -iE 'co-authored-by: (claude|copilot|cursor|cody|gpt)|generated with (claude code|copilot|cursor|cody)|ai-generated' || true)"
          if [ -n "$bad" ]; then
            echo "::error::커밋에 AI 트레일러/푸터가 포함되어 있습니다:"
            echo "$bad"
            exit 1
          fi
          echo "OK: AI 트레일러가 없습니다."

  # M-1.6: agents 디렉토리 무결성 (모든 스킬에 codex.yaml 존재, openai.yaml 부재)
  agents-integrity:
    name: agents/ integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check codex.yaml exists, openai.yaml removed
        run: |
          set -euo pipefail
          # skills/<name>/SKILL.md 가 있는 모든 스킬에 agents/codex.yaml 이 있어야 한다
          missing=0
          for d in skills/*/; do
            [[ -f "${d}SKILL.md" ]] || continue
            [[ -f "${d}agents/codex.yaml" ]] || {
              echo "::error::${d}agents/codex.yaml 이 없습니다."
              missing=1
            }
          done
          # 옛 agents/openai.yaml 가 어디에도 남아있으면 안 된다
          if find skills -path '*/agents/openai.yaml' -print -quit 2>/dev/null | grep -q .; then
            echo "::error::옛 agents/openai.yaml 가 아직 존재합니다. 제거하세요."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          echo "OK: agents/ 무결성 검사 통과 (codex.yaml 전 스킬 보유, openai.yaml 부재)."